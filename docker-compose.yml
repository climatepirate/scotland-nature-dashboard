services:
  qgis-server:
    image: qgis/qgis-server:ltr
    platform: linux/amd64
    container_name: scotland_nature_qgis_server
    ports:
      - "80:80"
      - "8080:80"
    environment:
      HOME: "/var/lib/qgis"
      QGIS_SERVER_LOG_LEVEL: "0"
      QGIS_SERVER_PARALLEL_RENDERING: "true"
    command:
      - /bin/bash
      - -lc
      - |
        cat >/usr/local/bin/pidof <<'EOF'
        #!/bin/sh
        if [ -n "$$1" ] && command -v /usr/bin/pgrep >/dev/null 2>&1; then
          exec /usr/bin/pgrep -f "$$1"
        fi
        exit 1
        EOF
        chmod +x /usr/local/bin/pidof
        cat >/etc/nginx/qgis.d/10-cors.conf <<'EOF'
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin,Content-Type,Accept" always;
        EOF

        if [ -f /io/workspace/dashboard_app/index.html ]; then
          rm -rf /usr/share/nginx/html/*
          cp -R /io/workspace/dashboard_app/. /usr/share/nginx/html/
          if [ -d /io/workspace/Data ]; then
            rm -rf /usr/share/nginx/html/Data
            cp -R /io/workspace/Data /usr/share/nginx/html/Data
          fi
        fi

        exec /usr/local/bin/start-xvfb-nginx.sh
    volumes:
      - ./:/io/workspace:ro
