services:
  qgis-server:
    image: qgis/qgis-server:ltr
    platform: linux/amd64
    container_name: scotland_nature_qgis_server
    ports:
      - "80:80"
      - "8080:80"
    environment:
      HOME: "/var/lib/qgis"
      QGIS_SERVER_LOG_LEVEL: "0"
      QGIS_SERVER_PARALLEL_RENDERING: "true"
      QGIS_PROJECT_FILE: "/io/workspace/CLEAN GIS/CLEAN GIS.qgz"
    command:
      - /bin/bash
      - -lc
      - |
        cat >/usr/local/bin/pidof <<'EOF'
        #!/bin/sh
        if [ -n "$$1" ] && command -v /usr/bin/pgrep >/dev/null 2>&1; then
          exec /usr/bin/pgrep -f "$$1"
        fi
        exit 1
        EOF
        chmod +x /usr/local/bin/pidof
        cat >/etc/nginx/qgis.d/10-cors.conf <<'EOF'
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Origin,Content-Type,Accept" always;
        EOF

        cat >/etc/nginx/qgis.d/20-dashboard-app-prefix.conf <<'EOF'
        location /dashboard_app/ {
          rewrite ^/dashboard_app/(.*)$ /$1 break;
        }
        EOF

        cat >/etc/nginx/qgis.d/25-data-routing.conf <<'EOF'
        location /Data/tiles/ {
          alias /io/workspace/dashboard_app/Data/tiles/;
        }
        location /Data/context/ {
          alias /io/workspace/dashboard_app/Data/context/;
        }
        EOF

        sed -i 's/\(application\/javascript\b.*\)js;/\1js mjs;/' /etc/nginx/mime.types
        sed -i 's/\(application\/json\b.*\)json;/\1json geojson;/' /etc/nginx/mime.types

        exec /usr/local/bin/start-xvfb-nginx.sh
    volumes:
      - ./:/io/workspace:ro
      - ./dashboard_app:/usr/share/nginx/html:ro
      - ./Data:/usr/share/nginx/html/Data:ro
